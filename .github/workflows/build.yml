name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            slug: windows-amd64
            artifact: uniTerm.exe
          - os: ubuntu-22.04
            platform: linux/amd64
            slug: linux-amd64
            artifact: uniTerm
          - os: macos-latest
            platform: darwin/universal
            slug: darwin-universal
            artifact: uniTerm.app

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Set version
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "VERSION=dev-${SHORT}" >> $GITHUB_ENV
          fi

      - name: Install and build frontend
        env:
          VITE_VERSION: ${{ env.VERSION }}
        run: cd frontend && npm install && npm run build

      - name: Install Linux dependencies
        if: matrix.platform == 'linux/amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install NSIS (Windows)
        if: matrix.platform == 'windows/amd64'
        shell: bash
        run: |
          choco install nsis -y
          NSIS_BIN="/c/Program Files (x86)/NSIS/Bin"
          if [ ! -f "$NSIS_BIN/makensis.exe" ]; then echo "ERROR: makensis.exe not found at $NSIS_BIN"; exit 1; fi
          echo "makensis: $NSIS_BIN/makensis.exe"

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "windows/amd64" ]; then
            export PATH="/c/Program Files (x86)/NSIS/Bin:$PATH"
          fi
          echo "PATH=$PATH"
          wails build -platform ${{ matrix.platform }} -ldflags "-s -w" -skipbindings ${{ matrix.platform == 'windows/amd64' && '-nsis' || '' }}

      - name: Fix macOS permissions and sign
        if: matrix.platform == 'darwin/universal'
        run: |
          chmod +x build/bin/uniTerm.app/Contents/MacOS/uniTerm
          codesign --force --deep --sign - build/bin/uniTerm.app

      - name: Package (macOS)
        if: matrix.platform == 'darwin/universal'
        run: |
          cd build/bin
          ditto -c -k --keepParent uniTerm.app ../../uniterm-darwin-universal-${VERSION}.zip
          mkdir -p dmg_staging/.background
          cp uniTerm.app/Contents/Resources/icon.icns dmg_staging/.background/bg.png 2>/dev/null || true
          cp -R uniTerm.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname uniTerm -size 200m -format UDRW -fs HFS+ -srcfolder dmg_staging tmp.dmg
          hdiutil attach tmp.dmg -mountpoint /Volumes/uniterm_dmg -nobrowse
          osascript -e '
          tell application "Finder"
            tell disk "uniTerm"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set the bounds of container window to {400, 100, 900, 420}
              set viewOptions to the icon view options of container window
              set arrangement of viewOptions to not arranged
              set icon size of viewOptions to 80
              set position of item "uniTerm.app" to {125, 140}
              set position of item "Applications" to {375, 140}
              update without registering applications
              close
            end tell
          end tell'
          hdiutil detach /Volumes/uniterm_dmg
          hdiutil convert tmp.dmg -format UDZO -o ../../uniterm-darwin-universal-${VERSION}.dmg
          rm -f tmp.dmg
          rm -rf dmg_staging

      - name: Rename NSIS installer (Windows)
        if: matrix.platform == 'windows/amd64'
        shell: bash
        run: mv build/bin/uniTerm-amd64-installer.exe "uniterm-windows-amd64-installer-$VERSION.exe"

      - name: Package (Windows)
        if: matrix.platform == 'windows/amd64'
        run: |
          cd build\bin
          Compress-Archive -Path uniTerm.exe -DestinationPath ..\..\uniterm-windows-amd64-$env:VERSION.zip

      - name: Package (Linux)
        if: matrix.platform == 'linux/amd64'
        run: |
          cd build/bin
          chmod +x uniTerm
          tar czf ../../uniterm-linux-amd64-${VERSION}.tar.gz uniTerm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uniTerm-${{ matrix.slug }}
          path: |
            uniterm-*.zip
            uniterm-*.tar.gz
            uniterm-*.exe
            uniterm-*.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          find artifacts -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name '*.exe' -o -name '*.dmg' \) -exec mv {} . \;
          ls -la uniterm-*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            uniterm-*.zip
            uniterm-*.tar.gz
            uniterm-*.exe
            uniterm-*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
